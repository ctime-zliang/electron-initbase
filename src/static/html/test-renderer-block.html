<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ElectronRemoteBlockDemo</title>
<style>
.count_down_cnt {
    font-size: 30px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100px;
}

.button_cnt {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100px;
}

.button {
    width: 200px;
    height: 50px;
    font-size: 15px;
    border-radius: 5px;
    background-color: #3878f5;
    color: white;
}

</style>
</head>
<body>
<h1>ElectronRemoteBlockDemo</h1>
<script>
function startRemoteAction() {
    const { getGlobal } = require('@electron/remote')

    console.log(`request get function ${Date.now()}`)
    console.time('1')
    const { createObjects } = getGlobal('mainProcessModule')
    console.timeEnd('1')
    console.log(`request get function End ${Date.now()}`)

    console.log(`request start function ${Date.now()}`)
    console.time('2')
    const obejcts = createObjects()
    console.timeEnd('2')
    console.log(`request start function End ${Date.now()}`)

    console.log(`request literate values ${Date.now()}`)
    console.time('3')
    for (const obejct of obejcts) {
        console.log(JSON.stringify(obejct))
    }
    console.timeEnd('3')
    console.log(`request literate values End ${Date.now()}`)
}

function startIPCAction() {
    const { ipcRenderer } = require('electron')
    ipcRenderer.send('blockTheMainProcess')
}

const textElement = document.createElement('div')
textElement.setAttribute('class', 'count_down_cnt')
let value = 0
setInterval(() => {
    value ++
    textElement.innerHTML = value
}, 500)
document.body.appendChild(textElement)

const buttonContainerElement = document.createElement('div')
buttonContainerElement.setAttribute('class', 'button_cnt')
document.body.appendChild(buttonContainerElement)

const buttonElement = document.createElement('button')
buttonElement.setAttribute('class', 'button')
buttonElement.onclick = startRemoteAction
buttonElement.innerHTML = 'RemoteAction'
buttonContainerElement.appendChild(buttonElement)

const buttonContainerElement2 = document.createElement('div')
buttonContainerElement2.setAttribute('class', 'button_cnt')
document.body.appendChild(buttonContainerElement2)

const buttonElement2 = document.createElement('button')
buttonElement2.setAttribute('class', 'button')
buttonElement2.onclick = startIPCAction
buttonElement2.innerHTML = 'IPCAction'
buttonContainerElement2.appendChild(buttonElement2)

</script>
</body>
</html>
